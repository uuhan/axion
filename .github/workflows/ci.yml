name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ZIG_VERSION: 0.16.0-dev.3059+42e33db9d

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: ~/zig
          key: zig-${{ env.ZIG_VERSION }}

      - name: Setup Zig
        run: |
          if [ ! -f "$HOME/zig/zig" ]; then
            wget -q "https://ziglang.org/builds/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -O /tmp/zig.tar.xz
            mkdir -p $HOME/zig
            tar -xf /tmp/zig.tar.xz -C $HOME/zig --strip-components=1
          fi
          echo "$HOME/zig" >> $GITHUB_PATH

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Verify Format
        run: zig fmt --check .

      - name: Build Project
        run: zig build --verbose

      - name: Run Tests
        run: zig build test --verbose

      - name: Build Benchmarks
        run: |
          zig build bench_native_axion --verbose
          zig build bench_native_sqlite --verbose
          zig build bench_vtab_axion --verbose
